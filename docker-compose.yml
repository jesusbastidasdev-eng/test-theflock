services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: chirp
      POSTGRES_PASSWORD: chirp
      POSTGRES_DB: chirp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chirp -d chirp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
